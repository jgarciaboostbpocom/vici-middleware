<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Middleware Dashboard v2</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#0b1220;color:#e7ecf3}
header{padding:16px 20px;border-bottom:1px solid #1f2a44;display:flex;align-items:center;gap:12px}
.pill{background:#14213d;border:1px solid #24304e;padding:6px 10px;border-radius:999px;font-size:12px;color:#e7ecf3}
.container{padding:18px 20px;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{background:#0f172a;border:1px solid #1f2a44;border-radius:14px;padding:14px}
.muted{color:#9fb0d1;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 8px;border-bottom:1px solid #14213d;text-align:left}
th{position:sticky;top:0;background:#0f172a}
.tag{font-size:12px;padding:3px 8px;border-radius:10px;border:1px solid #31406a}
.tag.call_queued{background:#0a2b1f;border-color:#0e5a41}
.tag.did_rotated{background:#2b0a1f;border-color:#5a0e41}
.tag.vm_drop{background:#26180a;border-color:#6a4a13}
.ok{color:#7bdcb5}
input::placeholder{color:#9fb0d1}
</style></head><body>
<header><h3 style="margin:0">Middleware Dashboard v2</h3><span id="health" class="pill">checking…</span>
<div style="margin-left:auto;display:flex;gap:8px;align-items:center">
<input id="filterState" placeholder="State (e.g. FL)" class="pill"/>
<input id="filterDid" placeholder="DID (digits)" class="pill"/>
<input id="filterPhone" placeholder="Phone contains" class="pill"/>
</div></header>
<div class="container"><div class="grid" id="didCards"></div>
<div class="card" style="margin-top:14px;">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
<strong>Live Events</strong><span class="muted" id="lastUpdated">—</span></div>
<div style="max-height:60vh;overflow:auto;"><table><thead><tr>
<th>Time</th><th>Type</th><th>DID</th><th>State</th><th>Phone</th><th>Details</th>
</tr></thead><tbody id="eventsBody"></tbody></table></div></div></div>
<script>
const POLL_MS=3000; let lastTs=0;
async function getJSON(u){const r=await fetch(u); return r.json();}
function fmtTime(ts){const d=new Date(ts); return d.toLocaleTimeString();}
function rowHtml(e){const tag=`<span class="tag ${e.type}">${e.type}</span>`;
 const det=Object.entries(e).filter(([k])=>!['ts','type'].includes(k))
 .map(([k,v])=>`${k}: ${v}`).join(' · ');
 return `<tr><td>${fmtTime(e.ts)}</td><td>${tag}</td><td>${e.did||''}</td><td>${e.state||''}</td><td>${e.leadPhone||''}</td><td class="muted">${det}</td></tr>`;}
async function refreshDidCards(){const dids=await getJSON('/api/ui-v2/dids/usage');
 const cards=(dids.items||[]).map(d=>`<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;">
   <strong>${d.did}</strong><span class="muted">${(d.states||[]).join(', ')}</span></div>
  <div style="display:flex;gap:14px;margin-top:8px;">
   <div><div class="muted">Calls Today</div><div class="ok" style="font-size:20px;">${d.callsToday}</div></div>
   <div><div class="muted">AHT</div><div>${d.ahtSec!=null?Math.round(d.ahtSec)+'s':'—'}</div></div>
   <div><div class="muted">Status</div><div>${d.status}</div></div></div></div>`).join('');
 document.getElementById('didCards').innerHTML=cards;}
async function poll(){try{
 const q=new URLSearchParams(); if(lastTs) q.set('since',String(lastTs));
 const did=document.getElementById('filterDid').value.trim();
 const st=document.getElementById('filterState').value.trim();
 const ph=document.getElementById('filterPhone').value.trim();
 if(did) q.set('did',did); if(st) q.set('state',st); if(ph) q.set('phone',ph);
 const data=await getJSON(`/api/ui-v2/events?${q.toString()}`); const list=data.items||[];
 if(list.length){ lastTs=Math.max(lastTs,...list.map(x=>x.ts));
  const body=document.getElementById('eventsBody'); body.insertAdjacentHTML('afterbegin', list.map(rowHtml).join('')); }
 document.getElementById('lastUpdated').textContent=`Updated ${new Date().toLocaleTimeString()}`;
 await refreshDidCards();
} catch(e){ console.error('poll failed',e);} finally{ setTimeout(poll,POLL_MS);}}
async function boot(){try{const h=await getJSON('/api/ui-v2/health');
 document.getElementById('health').textContent=h.ok?'online':'offline';
 if(h.ok) document.getElementById('health').classList.add('ok');}
 catch{document.getElementById('health').textContent='offline';} poll();}
for(const id of ['filterDid','filterState','filterPhone']){
 document.getElementById(id).addEventListener('change', ()=>{ lastTs=0; document.getElementById('eventsBody').innerHTML='';});}
boot();
</script></body></html>
