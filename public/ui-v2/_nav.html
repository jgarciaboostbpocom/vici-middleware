  <span id="readonlyBadge" style="margin-left:auto;font-size:12px;padding:4px 8px;border:1px solid #888;border-radius:8px"></span>

<script>
  // show READONLY badge by pinging a tiny endpoint that returns {readonly:true/false}
  fetch('/api/read/heartbeat').then(r=>r.json()).then(h=>{
    const el=document.getElementById('readonlyBadge');
    el.textContent = h.readonly ? 'READ-ONLY' : 'LIVE';
  }).catch(()=>{});
</script>
