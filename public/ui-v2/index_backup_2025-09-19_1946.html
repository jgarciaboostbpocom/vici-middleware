<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Middleware Dashboard v2</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#0b1220;color:#e7ecf3}
    header{padding:16px 20px;border-bottom:1px solid #1f2a44;display:flex;align-items:center;gap:12px}
    .pill{background:#14213d;border:1px solid #24304e;padding:6px 10px;border-radius:999px;font-size:12px;color:#e7ecf3}
    .container{padding:18px 20px;max-width:1400px;margin:0 auto}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    .card{background:#0f172a;border:1px solid #1f2a44;border-radius:14px;padding:14px}
    .muted{color:#9fb0d1;font-size:12px}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px 8px;border-bottom:1px solid #14213d;text-align:left}
    th{position:sticky;top:0;background:#0f172a}
    .tag{font-size:12px;padding:3px 8px;border-radius:10px;border:1px solid #31406a}
    .tag.call_queued{background:#0a2b1f;border-color:#0e5a41}
    .tag.did_rotated{background:#2b0a1f;border-color:#5a0e41}
    .tag.vm_drop{background:#26180a;border-color:#6a4a13}
    .ok{color:#7bdcb5}
    input::placeholder{color:#9fb0d1}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .btn{background:#101c3a;border:1px solid #2a3a66;border-radius:10px;padding:8px 12px;color:#e7ecf3;cursor:pointer}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    a.btn{display:inline-block;text-decoration:none}
    .right{margin-left:auto}
    .sep{height:1px;background:#1f2a44;margin:6px 0 12px}
    .status{font-size:12px}
    .success{color:#7bdcb5}
    .error{color:#ff8f87}
  </style>
</head>
<body>
  <header>
    <h3 style="margin:0">Middleware Dashboard v2</h3>
    <span id="health" class="pill">checking…</span>

    <div class="right row" style="align-items:center">
      <input id="adminToken" class="pill" placeholder="Admin token" style="min-width:240px">
      <button class="btn" id="saveTok">Save token</button>
      <a class="btn" href="/" target="_blank">Open Legacy Admin</a>
    </div>
  </header>

  <div class="container grid">

    <!-- DASHBOARD -->
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:8px;">
        <strong>Live Events</strong>
        <span class="muted" id="lastUpdated">—</span>
      </div>
      <div style="max-height:50vh;overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>Time</th><th>Type</th><th>DID</th><th>State</th><th>Phone</th><th>Details</th>
            </tr>
          </thead>
          <tbody id="eventsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ADMIN ACTIONS -->
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center;">
        <strong>Admin Actions</strong>
        <span class="muted">Uses your existing /admin API via x-admin-token</span>
      </div>
      <div class="sep"></div>

      <div class="row" style="align-items:center;margin-bottom:8px;">
        <input id="stateInput" class="pill" placeholder="State (e.g. FL)" style="width:120px">
        <button class="btn" id="btnForceState">Force rotate state</button>
        <button class="btn" id="btnForceAll">Rotate ALL states</button>
        <span id="adminMsg" class="status"></span>
      </div>
    </div>

  </div>

<script>
const POLL_MS=3000;
let lastTs=0;

function tok(){return localStorage.getItem('adminToken')||'';}
function setTok(v){localStorage.setItem('adminToken',v||'');}

async function getJSON(url){
  const res = await fetch(url);
  return res.json();
}

function fmtTime(ts){const d=new Date(ts);return d.toLocaleTimeString();}

function rowHtml(e){
  const tag=`<span class="tag ${e.type}">${e.type}</span>`;
  const det=Object.entries(e).filter(([k])=>!['ts','type'].includes(k))
              .map(([k,v])=>`${k}: ${v}`).join(' · ');
  return `<tr>
    <td>${fmtTime(e.ts)}</td>
    <td>${tag}</td>
    <td>${e.did||''}</td>
    <td>${e.state||''}</td>
    <td>${e.leadPhone||''}</td>
    <td class="muted">${det}</td>
  </tr>`;
}

// Poll events from our read-only API (if present)
async function poll(){
  try{
    const q=new URLSearchParams();
    if(lastTs) q.set('since',String(lastTs));
    const data = await getJSON(`/api/ui-v2/events?${q.toString()}`);
    const list = data.items || [];
    if(list.length){
      lastTs = Math.max(lastTs, ...list.map(x=>x.ts));
      document.getElementById('eventsBody')
        .insertAdjacentHTML('afterbegin', list.map(rowHtml).join(''));
    }
    document.getElementById('lastUpdated').textContent =
      `Updated ${new Date().toLocaleTimeString()}`;
  }catch(e){}
  finally{ setTimeout(poll,POLL_MS); }
}

// Helpers to show a result line in the table immediately
function addImmediateRotateRow(r){
  const e = {
    ts: Date.now(),
    type: 'did_rotated',
    did: r?.newDid || '',
    state: r?.state || '',
    leadPhone: '',
    details: r ? JSON.stringify(r) : ''
  };
  document.getElementById('eventsBody')
    .insertAdjacentHTML('afterbegin', rowHtml(e));
}

// ADMIN CALLS (reuse old admin endpoints with token)
async function postAdmin(path, body){
  const t = tok();
  if(!t) throw new Error('Missing admin token');
  const res = await fetch(path, {
    method:'POST',
    headers:{'Content-Type':'application/json','x-admin-token':t},
    body: JSON.stringify(body||{})
  });
  if(!res.ok){
    const txt = await res.text().catch(()=>String(res.status));
    throw new Error(`HTTP ${res.status} ${txt}`);
  }
  try{ return await res.json(); }catch{ return { ok:true }; }
}

async function forceRotateState(){
  msg('Working…');
  const st = (document.getElementById('stateInput').value||'').trim().toUpperCase();
  if(!st){ msg('Add state (e.g. FL)', true); return; }
  try{
    const r = await postAdmin('/admin/rotate/check', { state: st });
    if(r?.rotated){ addImmediateRotateRow(r); msg(`Rotated ${st}`, false); }
    else { msg(`No rotate for ${st} (${r?.reason||'—'})`, false); }
  }catch(e){ msg(e.message||String(e), true); }
}

async function forceRotateAll(){
  msg('Working…');
  try{
    const out = await postAdmin('/admin/rotate/force', {}); // server decides all
    const arr = Array.isArray(out) ? out : [out];
    let count=0;
    for(const r of arr){ if(r?.rotated){ addImmediateRotateRow(r); count++; } }
    msg(`Rotate-all done (${count} rotated)`, false);
  }catch(e){ msg(e.message||String(e), true); }
}

function msg(text, isErr){
  const el = document.getElementById('adminMsg');
  el.textContent = text;
  el.className = 'status ' + (isErr ? 'error' : 'success');
}

async function boot(){
  // health
  try {
    const h = await getJSON('/api/ui-v2/health');
    document.getElementById('health').textContent = h.ok ? 'online' : 'offline';
    if(h.ok) document.getElementById('health').classList.add('ok');
  } catch {
    document.getElementById('health').textContent = 'offline';
  }
  // token
  const t = tok();
  document.getElementById('adminToken').value = t;
  poll();
}

// wire UI
document.getElementById('saveTok').onclick = ()=>{
  setTok(document.getElementById('adminToken').value.trim());
  msg('Token saved', false);
};
document.getElementById('btnForceState').onclick = forceRotateState;
document.getElementById('btnForceAll').onclick = forceRotateAll;

boot();
</script>
</body>
</html>
